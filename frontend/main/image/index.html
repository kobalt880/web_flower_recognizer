<!DOCTYPE html>

<html lang="ru">
    <head>
        <title>Загрузка изображения</title>
        <meta charset="utf-8" name="viewport" content="width=device-width"/>
        <link rel="stylesheet" type="text/css" href="/sf/css/image.css"/>
    </head>

    <body>
        <h1>Загрузка изображения</h1>

        <div class="flex container">
            <input type="file" id="file-input" onchange="window.onLoadGlobal()"/>
            <button onclick="window.recognizeGlobal()">Распознать</button>
            <button onclick="window.location.assign('/')">Вернуться на главную</button>
        </div>

        <div id="result-card" class="flex container">
            <div class="flex image-container" id="image-container">
                <img id="preview"/>
            </div>

            <span id="loading"></span>

            <div id="info" class="flex container transparent">
                <div id="pred" class="flex"></div>
                <div id="conf" class="flex"></div>
            </div>
        </div>

        <script type="module" src="/sf/main/image/image.js"></script>
    </body>
</html>
